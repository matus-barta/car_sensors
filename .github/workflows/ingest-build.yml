name: Ingest - build

on:
  push:
    branches:
      - main
      - master
    paths:
      - "ingest/**"
      - "shared/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ingest.yml"
      - "!ingest/*.md"
      - ".dockerignore"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/car-sensors-ingest
          tags: |
            type=raw,value=latest
            type=sha
          labels: |
            org.opencontainers.image.title=Car Sensors Ingest
            org.opencontainers.image.description=Service responsible for ingesting sensor data
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.authors=Matus Barta

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ingest/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          # Native GitHub Actions cache
          cache-from: type=gha
          cache-to: type=gha,mode=max
